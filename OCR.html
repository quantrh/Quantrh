<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Pro Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#006B68',
                        accent: '#FFC62F',
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        .custom-file-input::-webkit-file-upload-button {
            visibility: hidden;
            width: 0;
        }
        .custom-file-input::before {
            content: 'Select Image';
            display: inline-block;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 8px 16px;
            outline: none;
            white-space: nowrap;
            -webkit-user-select: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: #334155;
            transition: all 0.2s;
        }
        .custom-file-input:hover::before { border-color: #006B68; }
        .custom-file-input:active::before { background: #e2e8f0; }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom scrollbar cho khung kết quả */
        .result-scroll::-webkit-scrollbar { width: 8px; }
        .result-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .result-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .result-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        
        <!-- Header -->
        <div class="bg-primary px-6 py-5 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                OCR Pro Scanner
            </h1>
            <p class="text-primary-100 text-sm mt-1 opacity-90">Local text recognition via iPhone</p>
        </div>

        <div class="p-6">
            <!-- Server IP Config -->
            <div class="mb-6">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Server Address</label>
                <div class="flex items-center bg-slate-50 rounded-lg border border-slate-200 px-3 py-2 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
                    <svg class="w-5 h-5 text-slate-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    <input type="text" id="serverUrl" value="http://192.168.100.170:8000" class="bg-transparent flex-1 text-[15px] font-medium outline-none text-slate-700" placeholder="http://192.168.x.x:8000">
                </div>
            </div>

            <!-- Vùng Upload (Sử dụng Form truyền thống target vào iframe) -->
            <form id="ocrForm" method="post" enctype="multipart/form-data" target="hidden_iframe" class="space-y-5 bg-surface p-5 rounded-xl border border-slate-200">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Select Target Image</label>
                    <div class="flex items-center gap-3">
                        <input type="file" name="file" id="fileInput" required class="custom-file-input text-slate-500 w-full" accept="image/*">
                    </div>
                    <p id="fileNameDisplay" class="text-xs text-slate-500 mt-2 hidden truncate"></p>
                </div>

                <!-- Vùng hiển thị ảnh xem trước -->
                <div id="imagePreviewContainer" class="hidden w-full flex justify-center bg-white border border-slate-200 rounded-lg p-2 shadow-sm">
                    <img id="imagePreview" src="" alt="Image Preview" class="max-w-full max-h-48 object-contain rounded-md">
                </div>

                <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                    <label class="flex items-start cursor-pointer group">
                        <div class="flex items-center h-5">
                            <!-- Đã thêm thuộc tính checked vào đây -->
                            <input type="checkbox" id="docOcr" name="docOcr" checked class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary focus:ring-2">
                        </div>
                        <div class="ml-3 text-sm">
                            <span class="font-medium text-slate-800 group-hover:text-primary transition-colors">Document Paragraph Detection</span>
                            <p class="text-slate-500 text-xs mt-0.5">Optimized for reading long text documents (iOS 26+)</p>
                        </div>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="w-full flex justify-center items-center bg-accent hover:bg-yellow-400 text-primary font-bold py-3 px-4 rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent disabled:opacity-70 disabled:cursor-not-allowed">
                    <span id="btnText">Process Image</span>
                </button>
            </form>

            <!-- Result Area -->
            <div id="resultArea" class="hidden mt-6 animate-fade-in-up">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-xs font-semibold text-primary uppercase tracking-wider">Server Response</label>
                </div>
                
                <div class="relative w-full h-48 bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                    <!-- Loading Overlay -->
                    <div id="loadingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 z-10">
                        <span class="loader border-primary !w-8 !h-8 mb-3"></span>
                        <span class="text-sm font-medium text-slate-600">Analyzing image on iPhone...</span>
                    </div>

                    <!-- Iframe hiển thị thẳng kết quả -->
                    <iframe name="result_iframe" id="result_iframe" class="w-full h-full border-none bg-transparent" title="OCR Result"></iframe>
                </div>
                <p class="text-[11px] text-slate-400 mt-2 text-center">Note: Due to browser security, please manually select and copy the JSON text above.</p>
            </div>

        </div>
    </div>

    <style>
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Tùy chỉnh màu loader cho phù hợp nền sáng */
        .loader.border-primary {
            border-color: rgba(0, 107, 104, 0.2);
            border-top-color: #006B68;
        }
    </style>

    <script>
        const form = document.getElementById("ocrForm");
        const docOcr = document.getElementById("docOcr");
        const serverUrlInput = document.getElementById("serverUrl");
        const iframe = document.getElementById("result_iframe");
        const btnText = document.getElementById("btnText");
        const submitBtn = document.getElementById("submitBtn");
        const resultArea = document.getElementById("resultArea");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const fileInput = document.getElementById("fileInput");
        const fileNameDisplay = document.getElementById("fileNameDisplay");
        const imagePreviewContainer = document.getElementById("imagePreviewContainer");
        const imagePreview = document.getElementById("imagePreview");

        let isSubmitting = false;

        // Hiển thị tên file và xem trước ảnh khi chọn
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                const file = e.target.files[0];
                
                // Hiển thị tên
                fileNameDisplay.textContent = `Selected: ${file.name}`;
                fileNameDisplay.classList.remove('hidden');

                // Hiển thị ảnh xem trước
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    imagePreviewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(file);

            } else {
                fileNameDisplay.classList.add('hidden');
                imagePreviewContainer.classList.add('hidden');
                imagePreview.src = "";
            }
        });

        // Xử lý trước khi Submit form
        form.addEventListener("submit", function (e) {
            let baseUrl = serverUrlInput.value.trim();
            if (!baseUrl) {
                e.preventDefault();
                alert("Please enter the Server address.");
                return;
            }

            // Định dạng lại URL
            if (!baseUrl.startsWith('http://') && !baseUrl.startsWith('https://')) {
                baseUrl = 'http://' + baseUrl;
            }
            baseUrl = baseUrl.replace(/\/$/, "");

            // Gán action cho form dựa vào checkbox
            form.action = (docOcr && docOcr.checked) ? (baseUrl + "/docOCR") : (baseUrl + "/upload");
            
            // Chỉ định form submit vào iframe hiển thị
            form.target = "result_iframe";

            // UI Feedback
            isSubmitting = true;
            submitBtn.disabled = true;
            btnText.textContent = 'Processing...';
            
            resultArea.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden'); // Hiện màn hình loading đè lên Iframe
            
            // Xoá nội dung iframe cũ (nếu có)
            iframe.src = "about:blank";
        });

        // Lắng nghe sự kiện iframe load xong
        iframe.onload = function() {
            if (!isSubmitting) return; 
            
            isSubmitting = false;
            submitBtn.disabled = false;
            btnText.textContent = 'Process Image';
            
            // Tắt màn hình loading để lộ ra kết quả JSON bên trong Iframe
            loadingOverlay.classList.add('hidden');
        };
    </script>
</body>
</html>
