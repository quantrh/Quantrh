<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Diễn tập DR Core Banking 2026 - BIDV</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config for BIDV Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bidv: {
                            primary: '#006B68',
                            accent: '#FFC62F',
                            primaryLight: '#006B681A', // 10% opacity
                            accentLight: '#FFC62F33' // 20% opacity
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for mobile horizontal menu */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-3 md:p-6 pb-20">

    <div id="app-root"></div>

    <script>
        // --- DATA & CONFIGURATION ---
        const DICT = {
            vi: {
                header_subtitle: "Ban Quản lý & Phát triển Core Banking",
                header_title: "Quản lý Diễn tập DR Core Banking 2026",
                progress: "Tiến độ tổng thể",
                stats_completed: "Hoàn thành",
                stats_running: "Đang chạy",
                stats_pending: "Chờ xử lý",
                stats_issue: "Sự cố / Rollback",
                phases_title: "Các Giai Đoạn",
                tasks_count: "tác vụ",
                col_time: "Thời gian",
                col_desc: "Nội dung thực hiện",
                col_unit: "Đơn vị đầu mối",
                col_status: "Trạng thái",
                col_action: "Cập nhật",
                empty_data: "Không có dữ liệu cho giai đoạn này.",
                btn_running: "Đang chạy",
                btn_completed: "Hoàn thành",
                btn_issue: "Sự cố",
            },
            en: {
                header_subtitle: "Core Banking Management & Dev Dept",
                header_title: "2026 Core Banking DR Drill Management",
                progress: "Overall Progress",
                stats_completed: "Completed",
                stats_running: "In Progress",
                stats_pending: "Pending",
                stats_issue: "Issue / Rollback",
                phases_title: "Drill Phases",
                tasks_count: "tasks",
                col_time: "Time",
                col_desc: "Task Description",
                col_unit: "Lead Unit",
                col_status: "Status",
                col_action: "Action",
                empty_data: "No data available for this phase.",
                btn_running: "Run",
                btn_completed: "Complete",
                btn_issue: "Issue",
            }
        };

        const PHASES = [
            { id: 'overview', vi: 'Tổng quan', en: 'Overview', icon: 'clipboard-list' },
            { id: 'prep', vi: 'Công tác chuẩn bị', en: 'Preparation Phase', icon: 'settings' },
            { id: 'dcdr', vi: 'Phase I: Chuyển DC sang DR', en: 'Phase I: DC to DR', icon: 'server-crash' },
            { id: 'drdc', vi: 'Phase II: Chuyển DR về DC', en: 'Phase II: DR to DC', icon: 'server' }
        ];

        const STATUS_CONFIG = {
            pending: { vi: 'Chờ xử lý', en: 'Pending', colorClass: 'bg-gray-100 text-gray-600 border-gray-200', icon: 'clock' },
            in_progress: { vi: 'Đang chạy', en: 'Running', colorClass: 'bg-[#FFC62F]/20 text-[#A67E00] border-[#FFC62F]/40', icon: 'play-circle' },
            completed: { vi: 'Hoàn thành', en: 'Completed', colorClass: 'bg-green-100 text-green-700 border-green-200', icon: 'check-circle-2' },
            issue: { vi: 'Gặp sự cố', en: 'Issue', colorClass: 'bg-red-100 text-red-700 border-red-200', icon: 'alert-triangle' }
        };

        // Dữ liệu trích xuất từ Tờ trình 433/TTr-QLPTCB
        const initialTasks = [
            // CÔNG TÁC CHUẨN BỊ
            { 
                id: 't1', phaseId: 'prep', time: 'Chậm nhất 16/04/2026', 
                title: { vi: 'Thông báo KH/đối tác về việc ngừng dịch vụ (3:00 - 4:10 ngày 18 & 19/4)', en: 'Notify customers/partners about service downtime' }, 
                unit: { vi: 'Ban KHBL, TTCSKH, Ban SPBL...', en: 'Retail Banking, CS Center...' }, 
                status: 'pending' 
            },

            // PHASE I: DC SANG DR (18/04)
            { 
                id: 't2', phaseId: 'dcdr', time: '03:00 - 03:25 (18/04)', 
                title: { vi: 'Dừng Service hạch toán kênh ngoài Core. Ngừng SOA. Ngừng ứng dụng thành phần Core tại DC.', en: 'Stop external Core services, SOA, and Core components at DC' }, 
                unit: { vi: 'TTCNTT & Ban QLPTCB', en: 'IT Center & Core Banking Dept' }, 
                status: 'pending' 
            },
            { 
                id: 't3', phaseId: 'dcdr', time: '03:25 - 03:30 (18/04)', 
                title: { vi: 'Kiểm tra lưu lượng, đảm bảo không còn backlog LMS từ DC (91.7) sang DR (171.5).', en: 'Check traffic, ensure no LMS backlog from DC to DR' }, 
                unit: { vi: 'TTCNTT & Ban QLPTCB', en: 'IT Center & Core Banking Dept' }, 
                status: 'pending' 
            },
            { 
                id: 't4', phaseId: 'dcdr', time: '03:30 - 03:45 (18/04)', 
                title: { vi: 'Hoán đổi Primary Profile từ DC (91.7) sang DR (171.5). Hoán đổi CSDL Oracle.', en: 'Switch Primary Profile & Oracle DB from DC to DR' }, 
                unit: { vi: 'Trung tâm CNTT', en: 'IT Center' }, 
                status: 'pending' 
            },
            { 
                id: 't5', phaseId: 'dcdr', time: '03:45 - 04:00 (18/04)', 
                title: { vi: 'Bật lại ứng dụng Core tại DR. Smoke test/Health check Xpress. Bật lại SOA kết nối DR.', en: 'Start Core at DR, Smoke test Xpress, reconnect SOA to DR' }, 
                unit: { vi: 'Trung tâm CNTT', en: 'IT Center' }, 
                status: 'pending' 
            },
            { 
                id: 't6', phaseId: 'dcdr', time: '04:00 (18/04)', 
                title: { vi: '[CHECKPOINT] Xác nhận hệ thống Core Banking chuyển DR thành công', en: '[CHECKPOINT] Core Banking successful DR transition' }, 
                unit: { vi: 'Ban QLPTCB', en: 'Core Banking Dept' }, 
                status: 'pending' 
            },
            { 
                id: 't7', phaseId: 'dcdr', time: '04:00 - 04:10 (18/04)', 
                title: { vi: 'Mở lại kênh giao dịch ngoài Core. Nghiệp vụ kiểm tra chức năng vấn tin, hạch toán.', en: 'Reopen external channels. Business units verify transactions.' }, 
                unit: { vi: 'Các Ban nghiệp vụ TSC', en: 'Head Office Business Units' }, 
                status: 'pending' 
            },
            { 
                id: 't8', phaseId: 'dcdr', time: '04:10 (18/04) - 03:00 (19/04)', 
                title: { vi: 'Theo dõi, vận hành hệ thống tại DR (Bao gồm chạy DayEnd ngày 18/04)', en: 'Monitor & operate at DR (Including DayEnd process)' }, 
                unit: { vi: 'TTCNTT & Ban QLPTCB', en: 'IT Center & Core Banking Dept' }, 
                status: 'pending' 
            },

            // PHASE II: DR TRỞ LẠI DC (19/04)
            { 
                id: 't9', phaseId: 'drdc', time: '03:00 - 03:25 (19/04)', 
                title: { vi: 'Dừng Service hạch toán kênh ngoài Core. Ngừng SOA. Ngừng ứng dụng thành phần Core tại DR.', en: 'Stop external Core services, SOA, and Core components at DR' }, 
                unit: { vi: 'TTCNTT & Ban QLPTCB', en: 'IT Center & Core Banking Dept' }, 
                status: 'pending' 
            },
            { 
                id: 't10', phaseId: 'drdc', time: '03:25 - 03:30 (19/04)', 
                title: { vi: 'Kiểm tra lưu lượng, đảm bảo không còn backlog LMS từ DR (171.5) về DC (91.5, 91.7).', en: 'Check traffic, ensure no LMS backlog from DR to DC' }, 
                unit: { vi: 'TTCNTT & Ban QLPTCB', en: 'IT Center & Core Banking Dept' }, 
                status: 'pending' 
            },
            { 
                id: 't11', phaseId: 'drdc', time: '03:30 - 03:45 (19/04)', 
                title: { vi: 'Hoán đổi Primary Profile từ DR (171.5) về lại DC (91.5). Hoán đổi CSDL Oracle.', en: 'Switch Primary Profile & Oracle DB from DR back to DC' }, 
                unit: { vi: 'Trung tâm CNTT', en: 'IT Center' }, 
                status: 'pending' 
            },
            { 
                id: 't12', phaseId: 'drdc', time: '03:45 - 04:00 (19/04)', 
                title: { vi: 'Bật lại ứng dụng Core tại DC. Smoke test/Health check Xpress. Bật lại SOA kết nối DC.', en: 'Start Core at DC, Smoke test Xpress, reconnect SOA to DC' }, 
                unit: { vi: 'Trung tâm CNTT', en: 'IT Center' }, 
                status: 'pending' 
            },
            { 
                id: 't13', phaseId: 'drdc', time: '04:00 - 04:10 (19/04)', 
                title: { vi: 'Mở lại kênh giao dịch ngoài Core. Nghiệp vụ kiểm tra chức năng vấn tin, hạch toán.', en: 'Reopen external channels. Business units verify transactions at DC.' }, 
                unit: { vi: 'Các Ban nghiệp vụ TSC', en: 'Head Office Business Units' }, 
                status: 'pending' 
            },
            { 
                id: 't14', phaseId: 'drdc', time: 'Từ 04:10 (19/04)', 
                title: { vi: 'Theo dõi, vận hành hệ thống Core Profile tại site DC như bình thường.', en: 'Monitor and operate Core Profile system at DC normally.' }, 
                unit: { vi: 'Ban QLPTCB', en: 'Core Banking Dept' }, 
                status: 'pending' 
            }
        ];

        // --- GLOBAL STATE ---
        // Đổi key localStorage để không bị đụng độ với app DR tổng thể
        let state = {
            tasks: JSON.parse(localStorage.getItem('bidv_dr_core_tasks_2026')) || initialTasks,
            activePhaseId: 'dcdr', // Đã đổi tab mặc định thành Quá trình chuyển DC-DR
            lang: 'vi'
        };

        // --- CORE FUNCTIONS ---
        function saveState() {
            localStorage.setItem('bidv_dr_core_tasks_2026', JSON.stringify(state.tasks));
        }

        function setLang(newLang) {
            state.lang = newLang;
            render();
        }

        function setActivePhase(phaseId) {
            state.activePhaseId = phaseId;
            render();
        }

        function updateTaskStatus(taskId, newStatus) {
            state.tasks = state.tasks.map(t => t.id === taskId ? { ...t, status: newStatus } : t);
            saveState();
            render();
        }

        function getStats() {
            const total = state.tasks.length;
            const completed = state.tasks.filter(t => t.status === 'completed').length;
            const in_progress = state.tasks.filter(t => t.status === 'in_progress').length;
            const pending = state.tasks.filter(t => t.status === 'pending').length;
            const issue = state.tasks.filter(t => t.status === 'issue').length;
            const progress = total === 0 ? 0 : Math.round((completed / total) * 100);
            return { total, completed, in_progress, pending, issue, progress };
        }

        function getPhaseName(id) {
            const phase = PHASES.find(p => p.id === id);
            return phase ? phase[state.lang] : '';
        }

        // --- RENDER FUNCTIONS ---
        function renderHeader(t, stats) {
            return `
            <header class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                <div class="flex-grow w-full">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2 text-bidv-primary mb-1">
                            <i data-lucide="activity" class="w-5 h-5 md:w-6 md:h-6"></i>
                            <h2 class="font-bold tracking-wide uppercase text-xs md:text-sm">${t.header_subtitle}</h2>
                        </div>
                        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200">
                            <i data-lucide="globe" class="w-4 h-4 text-slate-400 ml-1 hidden sm:block"></i>
                            <button onclick="setLang('vi')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${state.lang === 'vi' ? 'bg-white shadow text-bidv-primary' : 'text-slate-500 hover:text-slate-700'}">VI</button>
                            <button onclick="setLang('en')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${state.lang === 'en' ? 'bg-white shadow text-bidv-primary' : 'text-slate-500 hover:text-slate-700'}">EN</button>
                        </div>
                    </div>
                    <h1 class="text-xl md:text-2xl lg:text-3xl font-extrabold text-slate-900 mt-2">${t.header_title}</h1>
                    <p class="text-slate-500 mt-2 flex items-center gap-2 text-xs md:text-sm">
                        <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i> 18/04 - 19/04/2026 | Gián đoạn: 03:00 - 04:10
                    </p>
                </div>
                <div class="w-full lg:w-72 bg-slate-50 rounded-lg p-4 border border-slate-100 flex-shrink-0">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-semibold text-slate-600">${t.progress}</span>
                        <span class="text-xl font-bold text-bidv-primary">${stats.progress}%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                        <div class="bg-bidv-primary h-2.5 rounded-full transition-all duration-500" style="width: ${stats.progress}%"></div>
                    </div>
                </div>
            </header>`;
        }

        function renderStatsGrid(t, stats) {
            const statItems = [
                { label: t.stats_completed, value: stats.completed, color: 'text-green-600', bg: 'bg-green-50' },
                { label: t.stats_running, value: stats.in_progress, color: 'text-[#D49A00]', bg: 'bg-bidv-accentLight' },
                { label: t.stats_pending, value: stats.pending, color: 'text-slate-600', bg: 'bg-slate-100' },
                { label: t.stats_issue, value: stats.issue, color: 'text-red-600', bg: 'bg-red-50' }
            ];

            return `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6">
                ${statItems.map(s => `
                    <div class="p-4 rounded-xl border border-slate-200 bg-white flex flex-col items-center justify-center shadow-sm">
                        <span class="text-2xl md:text-3xl font-bold mb-1 ${s.color}">${s.value}</span>
                        <span class="text-xs md:text-sm font-medium text-slate-500 text-center">${s.label}</span>
                    </div>
                `).join('')}
            </div>`;
        }

        function renderSidebar(t) {
            return `
            <div class="lg:w-64 flex-shrink-0">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden lg:sticky lg:top-4">
                    <div class="p-4 bg-slate-50 border-b border-slate-200 hidden lg:block">
                        <h3 class="font-semibold text-slate-700">${t.phases_title}</h3>
                    </div>
                    <ul class="flex flex-row lg:flex-col p-2 gap-1.5 overflow-x-auto hide-scrollbar">
                        ${PHASES.map(phase => `
                            <li class="flex-shrink-0 lg:flex-shrink">
                                <button onclick="setActivePhase('${phase.id}')" class="w-full text-left px-3 py-2.5 lg:px-4 lg:py-3 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 ${state.activePhaseId === phase.id ? 'bg-bidv-primaryLight text-[#004A48]' : 'text-slate-600 hover:bg-slate-50'}">
                                    <i data-lucide="${phase.icon}" class="w-4 h-4 flex-shrink-0"></i>
                                    <span class="whitespace-nowrap lg:whitespace-normal">${phase[state.lang]}</span>
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            </div>`;
        }

        function renderTasks(t, filteredTasks) {
            if (filteredTasks.length === 0) {
                return `<div class="p-8 text-center text-slate-500">${t.empty_data}</div>`;
            }

            // Mobile Cards View
            const mobileView = `
            <div class="block lg:hidden divide-y divide-slate-100">
                ${filteredTasks.map(task => {
                    const statusConfig = STATUS_CONFIG[task.status];
                    return `
                    <div class="p-4 flex flex-col gap-3 hover:bg-slate-50 transition-colors">
                        <div class="flex justify-between items-start gap-2">
                            <span class="text-xs font-semibold text-bidv-primary bg-bidv-primaryLight px-2 py-1 rounded">${task.time}</span>
                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-medium border ${statusConfig.colorClass}">
                                <i data-lucide="${statusConfig.icon}" class="w-3 h-3"></i>
                                ${statusConfig[state.lang]}
                            </span>
                        </div>
                        <h4 class="font-semibold text-slate-800 text-sm leading-snug">${task.title[state.lang]}</h4>
                        ${state.activePhaseId === 'overview' ? `<span class="text-xs text-slate-500 flex items-center gap-1"><i data-lucide="chevron-right" class="w-3 h-3"></i> ${getPhaseName(task.phaseId)}</span>` : ''}
                        <div class="flex justify-between items-end mt-1">
                            <div class="flex items-start gap-1.5 text-xs text-slate-600 max-w-[60%]">
                                <i data-lucide="users" class="w-3.5 h-3.5 text-slate-400 mt-0.5 flex-shrink-0"></i>
                                <span class="leading-tight">${task.unit[state.lang]}</span>
                            </div>
                            <div class="flex items-center gap-1 bg-white border border-slate-100 rounded-lg p-1 shadow-sm">
                                <button onclick="updateTaskStatus('${task.id}', 'in_progress')" class="p-1.5 text-[#D49A00] hover:bg-bidv-accentLight rounded"><i data-lucide="play-circle" class="w-4 h-4"></i></button>
                                <button onclick="updateTaskStatus('${task.id}', 'completed')" class="p-1.5 text-green-600 hover:bg-green-50 rounded"><i data-lucide="check-circle-2" class="w-4 h-4"></i></button>
                                <button onclick="updateTaskStatus('${task.id}', 'issue')" class="p-1.5 text-red-600 hover:bg-red-50 rounded"><i data-lucide="alert-triangle" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>`;
                }).join('')}
            </div>`;

            // Desktop Table View
            const desktopView = `
            <div class="hidden lg:block overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-600">
                    <thead class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 w-[15%]">${t.col_time}</th>
                            <th class="px-6 py-4 w-[40%]">${t.col_desc}</th>
                            <th class="px-6 py-4 w-[20%]">${t.col_unit}</th>
                            <th class="px-6 py-4 w-[15%]">${t.col_status}</th>
                            <th class="px-6 py-4 w-[10%] text-center">${t.col_action}</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${filteredTasks.map(task => {
                            const statusConfig = STATUS_CONFIG[task.status];
                            return `
                            <tr class="hover:bg-slate-50 transition-colors group">
                                <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-800">${task.time}</td>
                                <td class="px-6 py-4">
                                    <span class="block font-medium text-slate-800 mb-1">${task.title[state.lang]}</span>
                                    ${state.activePhaseId === 'overview' ? `<span class="inline-block px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-xs">${getPhaseName(task.phaseId)}</span>` : ''}
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-start gap-2">
                                        <i data-lucide="users" class="w-4 h-4 text-slate-400 mt-0.5 flex-shrink-0"></i>
                                        <span class="text-slate-700">${task.unit[state.lang]}</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border ${statusConfig.colorClass}">
                                        <i data-lucide="${statusConfig.icon}" class="w-3.5 h-3.5"></i>
                                        ${statusConfig[state.lang]}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="updateTaskStatus('${task.id}', 'in_progress')" class="p-1.5 text-[#D49A00] hover:bg-bidv-accentLight rounded" title="${t.btn_running}"><i data-lucide="play-circle" class="w-5 h-5"></i></button>
                                        <button onclick="updateTaskStatus('${task.id}', 'completed')" class="p-1.5 text-green-600 hover:bg-green-50 rounded" title="${t.btn_completed}"><i data-lucide="check-circle-2" class="w-5 h-5"></i></button>
                                        <button onclick="updateTaskStatus('${task.id}', 'issue')" class="p-1.5 text-red-600 hover:bg-red-50 rounded" title="${t.btn_issue}"><i data-lucide="alert-triangle" class="w-5 h-5"></i></button>
                                    </div>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;

            return mobileView + desktopView;
        }

        function render() {
            const t = DICT[state.lang];
            const stats = getStats();
            const filteredTasks = state.activePhaseId === 'overview' ? state.tasks : state.tasks.filter(task => task.phaseId === state.activePhaseId);

            const html = `
                ${renderHeader(t, stats)}
                ${renderStatsGrid(t, stats)}
                <div class="flex flex-col lg:flex-row gap-6">
                    ${renderSidebar(t)}
                    <div class="flex-grow bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 class="font-semibold text-slate-800 text-base md:text-lg">${getPhaseName(state.activePhaseId)}</h3>
                            <span class="text-xs md:text-sm text-slate-500 bg-white px-2 py-1 rounded-md border border-slate-200">${filteredTasks.length} ${t.tasks_count}</span>
                        </div>
                        ${renderTasks(t, filteredTasks)}
                    </div>
                </div>
            `;

            document.getElementById('app-root').innerHTML = html;
            
            // Re-initialize Lucide Icons after DOM update
            lucide.createIcons();
        }

        // --- INITIALIZE ---
        render();

    </script>
</body>
</html>
