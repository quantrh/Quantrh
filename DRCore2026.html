            { id: 't3', phaseId: 'prep', time: 'Trước 17/4/2026', title: { vi: 'Khởi tạo Group Zalo UCSC&PHTH, add các thành viên liên quan', en: 'Create Zalo Group, add relevant members' }, unit: { vi: 'Nhóm DR đầu mối', en: 'Core DR Team' }, status: 'completed', note: '' },
            { id: 't4', phaseId: 'ready', time: '17h00-20h00 (17/4/2026)', title: { vi: 'Di chuyển nhân sự chỉ đạo/điều phối đến vị trí diễn tập (DC2 - iDC Viettel)', en: 'Relocate steering personnel to DC2 (iDC Viettel)' }, unit: { vi: 'Nhóm quản trị hậu cần (VP TSC)', en: 'Logistics Admin Team' }, status: 'pending', note: '' },

            { id: 't11', phaseId: 'dcdr', time: '03h00-04h00 (18/4)', title: { vi: '[CORE] Chuyển DR 10 HTTT cấp độ 3 (Corebanking, Way4, SOA, ESB...)', en: '[CORE] Transition 10 Level-3 Systems (Corebanking, Way4...)' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't12', phaseId: 'dcdr', time: '04h00-04h30 (18/4)', title: { vi: 'Kiểm tra nghiệp vụ trên môi trường DR, đối chiếu, xử lý sai lệch (nếu có)', en: 'Business validation on DR environment, resolve discrepancies' }, unit: { vi: 'Nhóm ND nghiệp vụ, Ban nghiệp vụ TSC', en: 'Business Users' }, status: 'pending', note: '' },
            { id: 't13', phaseId: 'dcdr', time: '04h30 (18/4)', title: { vi: 'CHECK POINT: Xác nhận kết quả chuyển DR Corebanking', en: 'CHECK POINT: Confirm Corebanking transition' }, unit: { vi: 'Nhóm điều phối', en: 'Coordination Team' }, status: 'pending', note: '' },
            { id: 't14', phaseId: 'dcdr', time: '04h00-05h30 (18/4)', title: { vi: '[ONLINE 24/7] Chuyển DR 8 HTTT (Smart Banking, iBank 1.5, TTHĐ, ePIN, NAPAS...)', en: '[ONLINE 24/7] Transition 8 Systems (Smart Banking, iBank...)' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't15', phaseId: 'dcdr', time: '06h00 (18/4)', title: { vi: 'CHECK POINT: Xác nhận kết quả chuyển DR Online 24/7', en: 'CHECK POINT: Confirm Online 24/7 transition' }, unit: { vi: 'Nhóm điều phối', en: 'Coordination Team' }, status: 'pending', note: '' },
            { id: 't16', phaseId: 'dcdr', time: '09h00-10h00 (18/4)', title: { vi: '[ĐỢT 3] Chuyển DR 14 HTTT cấp độ 3 còn lại (BOne, SWIFT, Citad...)', en: '[PHASE 3] Transition 14 remaining Level-3 Systems' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't17', phaseId: 'dcdr', time: '11h30-12h30 (18/4)', title: { vi: 'SƠ KẾT: Họp tổng hợp kết quả chuyển DC-DR', en: 'PRELIMINARY REVIEW: DC-DR Transition' }, unit: { vi: 'Ban công nghệ, TTCNTT', en: 'Technology Dept, IT Center' }, status: 'pending', note: '' },
            { id: 't18', phaseId: 'drdc', time: '21h00-22h00 (18/4)', title: { vi: 'Chuyển về DC1 đối với 08 HTTT cấp độ 3 (Đợt 1) & WAN', en: 'Return 8 Level-3 Systems (Phase 1) & WAN to DC1' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't19', phaseId: 'drdc', time: '23h00-24h00 (18/4)', title: { vi: 'Chuyển về DC1 đối với 08 HTTT cấp độ 2', en: 'Return 8 Level-2 Systems to DC1' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't20', phaseId: 'drdc', time: '03h00-04h00 (19/4)', title: { vi: 'Chuyển về DC1 đối với hệ thống Corebanking, Way4, SOA...', en: 'Return Corebanking, Way4, SOA to DC1' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't21', phaseId: 'drdc', time: '04h00-05h30 (19/4)', title: { vi: 'Chuyển về DC1 đối với HTTT Online 24/7 (SmartBanking, iBank...)', en: 'Return Online 24/7 Systems to DC1' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't22', phaseId: 'drdc', time: '08h00-09h00 (19/4)', title: { vi: 'Chuyển về DC1 đối với 14 HTTT cấp độ 3 còn lại', en: 'Return 14 remaining Level-3 Systems to DC1' }, unit: { vi: 'Nhóm kỹ thuật (TTCNTT)', en: 'IT Technical Teams' }, status: 'pending', note: '' },
            { id: 't23', phaseId: 'drdc', time: '10h30-12h00 (19/4)', title: { vi: 'TỔNG KẾT: Họp tổng kết toàn bộ diễn tập DR tổng thể', en: 'FINAL REVIEW: Overall DR Drill' }, unit: { vi: 'Ban công nghệ, TTCNTT', en: 'Technology Dept, IT Center' }, status: 'pending', note: '' }
        ];

        // --- GLOBAL STATE ---
        let state = {
            tasks: initialTasks,
            activePhaseId: 'dcdr',
            lang: 'vi',
            modalOpen: false,
            pendingAction: null, 
            passcodeError: false,
            // Cờ xác thực ghi nhớ đăng nhập trình duyệt (nếu đã nhập đúng pass trong phiên này)
            isPasscodeVerified: localStorage.getItem('bidv_passcode_verified') === 'true'
        };

        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = 'https://rmbsxccrwrktbjlnezpu.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtYnN4Y2Nyd3JrdGJqbG5lenB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg2MjczNjQsImV4cCI6MjA2NDIwMzM2NH0.ydCqificftdtn1niRciFCifeuo8aX6SDGti-hCY5Z_Y'; 
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            realtime: { params: { eventsPerSecond: 0 } }
        });

        async function initializeBackend() {
            try {
                const { data, error } = await supabaseClient.from('bidv_dr_tasks_tong_the').select('tasks_data').eq('id', 1).single();
                if (data && data.tasks_data) {
                    state.tasks = data.tasks_data;
                    render();
                } else {
                    await supabaseClient.from('bidv_dr_tasks_tong_the').upsert({ id: 1, tasks_data: initialTasks });
                }
            } catch (error) {
                console.error("Lỗi khi tải dữ liệu từ Supabase:", error);
            }
        }
        
        initializeBackend();

        // --- CORE FUNCTIONS ---
        function setLang(newLang) {
            state.lang = newLang;
            render();
        }

        function setActivePhase(phaseId) {
            state.activePhaseId = phaseId;
            render();
        }

        function clearPasscodeCache() {
            localStorage.removeItem('bidv_passcode_verified');
            state.isPasscodeVerified = false;
            render();
        }

        // --- XỬ LÝ GHI CHÚ (NOTE) ---
        async function updateTaskNote(taskId, newNote) {
            if (state.isPasscodeVerified) {
                await executeTaskUpdate({ type: 'note', taskId, newValue: newNote });
            } else {
                state.modalOpen = true;
                state.pendingAction = { type: 'note', taskId, newValue: newNote };
                state.passcodeError = false;
                render();
                setTimeout(() => { document.getElementById('passcode-input')?.focus(); }, 50);
            }
        }

        // --- XỬ LÝ TRẠNG THÁI (STATUS) ---
        function updateTaskStatus(taskId, newStatus) {
            if (state.isPasscodeVerified) {
                executeTaskUpdate({ type: 'status', taskId, newValue: newStatus });
            } else {
                state.modalOpen = true;
                state.pendingAction = { type: 'status', taskId, newValue: newStatus };
                state.passcodeError = false;
                render();
                setTimeout(() => { document.getElementById('passcode-input')?.focus(); }, 50);
            }
        }

        function closeModal() {
            state.modalOpen = false;
            state.pendingAction = null;
            state.passcodeError = false;
            // Render lại sẽ tự động reset các ô input (textarea) bị sửa nháp về nguyên trạng Database
            render();
        }

        function submitPasscode() {
            const input = document.getElementById('passcode-input');
            if (input && input.value === 'bidvdr') {
                // Lưu lại chứng nhận đã xác thực vào LocalStorage
                localStorage.setItem('bidv_passcode_verified', 'true');
                state.isPasscodeVerified = true;
                executeTaskUpdate();
            } else {
                state.passcodeError = true;
                render();
                setTimeout(() => {
                    const inputRef = document.getElementById('passcode-input');
                    if (inputRef) { inputRef.focus(); inputRef.value = ''; }
                }, 10);
            }
        }

        async function executeTaskUpdate(directAction = null) {
            const action = directAction || state.pendingAction;
            if (!action) return;

            const { type, taskId, newValue } = action;

            if (type === 'status') {
                state.tasks = state.tasks.map(t => t.id === taskId ? { ...t, status: newValue } : t);
            } else if (type === 'note') {
                state.tasks = state.tasks.map(t => t.id === taskId ? { ...t, note: newValue } : t);
            }
            
            state.modalOpen = false;
            state.pendingAction = null;
            state.passcodeError = false;
            render();
            
            try {
                await supabaseClient.from('bidv_dr_tasks_tong_the').upsert({ id: 1, tasks_data: state.tasks });
            } catch (error) {
                console.error("Lỗi khi lưu trữ lên Supabase:", error);
            }
        }

        function getStats() {
            const total = state.tasks.length;
            const completed = state.tasks.filter(t => t.status === 'completed').length;
            const in_progress = state.tasks.filter(t => t.status === 'in_progress').length;
            const pending = state.tasks.filter(t => t.status === 'pending').length;
            const issue = state.tasks.filter(t => t.status === 'issue').length;
            const progress = total === 0 ? 0 : Math.round((completed / total) * 100);
            return { total, completed, in_progress, pending, issue, progress };
        }

        function getPhaseName(id) {
            const phase = PHASES.find(p => p.id === id);
            return phase ? phase[state.lang] : '';
        }

        // --- RENDER FUNCTIONS ---
        function renderHeader(t, stats) {
            const authBadge = state.isPasscodeVerified 
                ? `<div class="mt-2 inline-flex items-center gap-1.5 px-2 py-1 bg-green-50 border border-green-200 text-green-700 rounded text-xs font-medium cursor-pointer hover:bg-green-100" onclick="clearPasscodeCache()" title="Nhấn để đăng xuất"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> ${t.auth_success}</div>` 
                : ``;

            return `
            <header class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                <div class="flex-grow w-full">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2 text-bidv-primary mb-1">
                            <i data-lucide="activity" class="w-5 h-5 md:w-6 md:h-6"></i>
                            <h2 class="font-bold tracking-wide uppercase text-xs md:text-sm">${t.header_subtitle}</h2>
                        </div>
                        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200">
                            <i data-lucide="globe" class="w-4 h-4 text-slate-400 ml-1 hidden sm:block"></i>
                            <button onclick="setLang('vi')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${state.lang === 'vi' ? 'bg-white shadow text-bidv-primary' : 'text-slate-500 hover:text-slate-700'}">VI</button>
                            <button onclick="setLang('en')" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all ${state.lang === 'en' ? 'bg-white shadow text-bidv-primary' : 'text-slate-500 hover:text-slate-700'}">EN</button>
                        </div>
                    </div>
                    <h1 class="text-xl md:text-2xl lg:text-3xl font-extrabold text-slate-900 mt-2">${t.header_title}</h1>
                    <div class="flex items-center gap-3">
                        <p class="text-slate-500 mt-2 flex items-center gap-2 text-xs md:text-sm">
                            <i data-lucide="calendar" class="w-4 h-4 flex-shrink-0"></i> 17/04 - 19/04/2026 | DC2: iDC Viettel
                        </p>
                        ${authBadge}
                    </div>
                </div>
                <div class="w-full lg:w-72 bg-slate-50 rounded-lg p-4 border border-slate-100 flex-shrink-0">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-semibold text-slate-600">${t.progress}</span>
                        <span class="text-xl font-bold text-bidv-primary">${stats.progress}%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                        <div class="bg-bidv-primary h-2.5 rounded-full transition-all duration-500" style="width: ${stats.progress}%"></div>
                    </div>
                </div>
            </header>`;
        }

        function renderStatsGrid(t, stats) {
            const statItems = [
                { label: t.stats_completed, value: stats.completed, color: 'text-green-600', bg: 'bg-green-50' },
                { label: t.stats_running, value: stats.in_progress, color: 'text-[#D49A00]', bg: 'bg-bidv-accentLight' },
                { label: t.stats_pending, value: stats.pending, color: 'text-slate-600', bg: 'bg-slate-100' },
                { label: t.stats_issue, value: stats.issue, color: 'text-red-600', bg: 'bg-red-50' }
            ];

            return `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6">
                ${statItems.map(s => `
                    <div class="p-4 rounded-xl border border-slate-200 bg-white flex flex-col items-center justify-center shadow-sm">
                        <span class="text-2xl md:text-3xl font-bold mb-1 ${s.color}">${s.value}</span>
                        <span class="text-xs md:text-sm font-medium text-slate-500 text-center">${s.label}</span>
                    </div>
                `).join('')}
            </div>`;
        }

        function renderSidebar(t) {
            return `
            <div class="lg:w-64 flex-shrink-0">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden lg:sticky lg:top-4">
                    <div class="p-4 bg-slate-50 border-b border-slate-200 hidden lg:block">
                        <h3 class="font-semibold text-slate-700">${t.phases_title}</h3>
                    </div>
                    <ul class="flex flex-row lg:flex-col p-2 gap-1.5 overflow-x-auto hide-scrollbar">
                        ${PHASES.map(phase => `
                            <li class="flex-shrink-0 lg:flex-shrink">
                                <button onclick="setActivePhase('${phase.id}')" class="w-full text-left px-3 py-2.5 lg:px-4 lg:py-3 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 ${state.activePhaseId === phase.id ? 'bg-bidv-primaryLight text-[#004A48]' : 'text-slate-600 hover:bg-slate-50'}">
                                    <i data-lucide="${phase.icon}" class="w-4 h-4 flex-shrink-0"></i>
                                    <span class="whitespace-nowrap lg:whitespace-normal">${phase[state.lang]}</span>
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            </div>`;
        }

        function renderTasks(t, filteredTasks) {
            if (filteredTasks.length === 0) {
                return `<div class="p-8 text-center text-slate-500">${t.empty_data}</div>`;
            }

            // Mobile Cards View
            const mobileView = `
            <div class="block lg:hidden divide-y divide-slate-100">
                ${filteredTasks.map(task => {
                    const statusConfig = STATUS_CONFIG[task.status];
                    return `
                    <div class="p-4 flex flex-col gap-3 hover:bg-slate-50 transition-colors">
                        <div class="flex justify-between items-start gap-2">
                            <span class="text-xs font-semibold text-bidv-primary bg-bidv-primaryLight px-2 py-1 rounded">${task.time}</span>
                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-medium border ${statusConfig.colorClass}">
                                <i data-lucide="${statusConfig.icon}" class="w-3 h-3"></i>
                                ${statusConfig[state.lang]}
                            </span>
                        </div>
                        <h4 class="font-semibold text-slate-800 text-sm leading-snug">${task.title[state.lang]}</h4>
                        
                        <div class="flex flex-col gap-2 mt-1">
                            <div class="flex justify-between items-end">
                                <div class="flex items-start gap-1.5 text-xs text-slate-600 max-w-[50%]">
                                    <i data-lucide="users" class="w-3.5 h-3.5 text-slate-400 mt-0.5 flex-shrink-0"></i>
                                    <span class="leading-tight">${task.unit[state.lang]}</span>
                                </div>
                                <div class="flex items-center gap-1 bg-white border border-slate-100 rounded-lg p-1 shadow-sm">
                                    <button onclick="updateTaskStatus('${task.id}', 'pending')" class="p-1.5 text-slate-500 hover:bg-slate-100 rounded" title="${t.btn_pending}"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                                    <button onclick="updateTaskStatus('${task.id}', 'in_progress')" class="p-1.5 text-[#D49A00] hover:bg-bidv-accentLight rounded" title="${t.btn_running}"><i data-lucide="play-circle" class="w-4 h-4"></i></button>
                                    <button onclick="updateTaskStatus('${task.id}', 'completed')" class="p-1.5 text-green-600 hover:bg-green-50 rounded" title="${t.btn_completed}"><i data-lucide="check-circle-2" class="w-4 h-4"></i></button>
                                    <button onclick="updateTaskStatus('${task.id}', 'issue')" class="p-1.5 text-red-600 hover:bg-red-50 rounded" title="${t.btn_issue}"><i data-lucide="alert-triangle" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            
                            <div class="w-full mt-2 relative">
                                <i data-lucide="message-square" class="w-3.5 h-3.5 text-slate-400 absolute left-2 top-2.5"></i>
                                <textarea
                                    class="w-full text-xs text-slate-700 bg-white border border-slate-200 rounded-lg py-2 pl-7 pr-2 focus:ring-1 focus:ring-bidv-primary/50 focus:border-bidv-primary resize-none placeholder-slate-400 shadow-sm"
                                    rows="1"
                                    placeholder="${t.placeholder_note}"
                                    onchange="updateTaskNote('${task.id}', this.value)"
                                >${task.note || ''}</textarea>
                            </div>
                        </div>
                    </div>`;
                }).join('')}
            </div>`;

            // Desktop Table View
            const desktopView = `
            <div class="hidden lg:block overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-600">
                    <thead class="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 w-[12%]">${t.col_time}</th>
                            <th class="px-6 py-4 w-[28%]">${t.col_desc}</th>
                            <th class="px-6 py-4 w-[15%]">${t.col_unit}</th>
                            <th class="px-6 py-4 w-[13%]">${t.col_status}</th>
                            <th class="px-6 py-4 w-[22%]">${t.col_note}</th>
                            <th class="px-6 py-4 w-[10%] text-center">${t.col_action}</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${filteredTasks.map(task => {
                            const statusConfig = STATUS_CONFIG[task.status];
                            return `
                            <tr class="hover:bg-slate-50 transition-colors group">
                                <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-800">${task.time}</td>
                                <td class="px-6 py-4 font-medium text-slate-800">${task.title[state.lang]}</td>
                                <td class="px-6 py-4">
                                    <div class="flex items-start gap-2">
                                        <i data-lucide="users" class="w-4 h-4 text-slate-400 mt-0.5 flex-shrink-0"></i>
                                        <span class="text-slate-700">${task.unit[state.lang]}</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border ${statusConfig.colorClass}">
                                        <i data-lucide="${statusConfig.icon}" class="w-3.5 h-3.5"></i>
                                        ${statusConfig[state.lang]}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <textarea
                                        class="w-full text-sm text-slate-700 bg-white border border-slate-200 rounded shadow-sm p-2 focus:ring-2 focus:ring-bidv-primary/20 focus:border-bidv-primary resize-none hide-scrollbar placeholder-slate-400 transition-colors"
                                        rows="2"
                                        placeholder="${t.placeholder_note}"
                                        onchange="updateTaskNote('${task.id}', this.value)"
                                    >${task.note || ''}</textarea>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="updateTaskStatus('${task.id}', 'pending')" class="p-1.5 text-slate-500 hover:bg-slate-100 rounded" title="${t.btn_pending}"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                                        <button onclick="updateTaskStatus('${task.id}', 'in_progress')" class="p-1.5 text-[#D49A00] hover:bg-bidv-accentLight rounded" title="${t.btn_running}"><i data-lucide="play-circle" class="w-5 h-5"></i></button>
                                        <button onclick="updateTaskStatus('${task.id}', 'completed')" class="p-1.5 text-green-600 hover:bg-green-50 rounded" title="${t.btn_completed}"><i data-lucide="check-circle-2" class="w-5 h-5"></i></button>
                                        <button onclick="updateTaskStatus('${task.id}', 'issue')" class="p-1.5 text-red-600 hover:bg-red-50 rounded" title="${t.btn_issue}"><i data-lucide="alert-triangle" class="w-5 h-5"></i></button>
                                    </div>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;

            return mobileView + desktopView;
        }

        function renderModal(t) {
            return `
            <div id="passcode-modal" class="${state.modalOpen ? 'flex' : 'hidden'} fixed inset-0 z-50 items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 transition-opacity">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="lock" class="w-5 h-5 text-bidv-primary"></i>
                            ${t.modal_title}
                        </h3>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 outline-none"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="p-5">
                        <p class="text-sm text-slate-600 mb-3">${t.modal_desc}</p>
                        <input type="password" id="passcode-input" 
                            class="w-full border ${state.passcodeError ? 'border-red-500 ring-red-100' : 'border-slate-300'} rounded-lg px-3 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-bidv-primary/50" 
                            placeholder="${t.modal_placeholder}" 
                            onkeydown="if(event.key === 'Enter') submitPasscode()">
                        ${state.passcodeError ? `<p class="text-xs text-red-500 mt-2 font-medium"><i data-lucide="alert-circle" class="w-3 h-3 inline"></i> ${t.modal_error}</p>` : ''}
                    </div>
                    <div class="p-4 bg-slate-50 flex justify-end gap-2">
                        <button onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-200 transition-colors outline-none">${t.btn_cancel}</button>
                        <button onclick="submitPasscode()" class="px-4 py-2 rounded-lg text-sm font-medium bg-bidv-primary text-white hover:bg-[#005553] transition-colors outline-none">${t.btn_confirm}</button>
                    </div>
                </div>
            </div>`;
        }

        function render() {
            const t = DICT[state.lang];
            const stats = getStats();
            const filteredTasks = state.activePhaseId === 'overview' ? state.tasks : state.tasks.filter(task => task.phaseId === state.activePhaseId);

            const html = `
                ${renderHeader(t, stats)}
                ${renderStatsGrid(t, stats)}
                <div class="flex flex-col lg:flex-row gap-6">
                    ${renderSidebar(t)}
                    <div class="flex-grow bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                            <h3 class="font-semibold text-slate-800 text-base md:text-lg">${getPhaseName(state.activePhaseId)}</h3>
                            <span class="text-xs md:text-sm text-slate-500 bg-white px-2 py-1 rounded-md border border-slate-200">${filteredTasks.length} ${t.tasks_count}</span>
                        </div>
                        ${renderTasks(t, filteredTasks)}
                    </div>
                </div>
                ${renderModal(t)}
            `;

            document.getElementById('app-root').innerHTML = html;
            lucide.createIcons();
        }

        // --- INITIALIZE ---
        render();

    </script>
</body>
</html>
